name: Release (retired)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  retired:
    name: Release disabled
    runs-on: ubuntu-latest
    steps:
      - name: Explain retirement
        run: |
          echo "FS25_PhobosLib is retired for FS25 runtime use."
          echo "No new release packages should be published from this repository."
          echo "Keep this repository for historical source, docs, and archived references only."
          exit 1
