name: Bug Report
description: Report something that is not working correctly.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: input
    id: mod-version
    attributes:
      label: Library Version
      description: Which version or commit are you using?
      placeholder: "0.1.1.0"
    validations:
      required: true
  - type: dropdown
    id: performance-impact
    attributes:
      label: Performance Gate Impact
      description: Does this look like a target miss that should freeze new feature work?
      options:
        - Unknown
        - No
        - Soft target miss
        - Hard target miss
    validations:
      required: true
  - type: textarea
    id: log
    attributes:
      label: Log Snippet
      description: Paste the relevant Farming Simulator log lines if available.
      render: text
    validations:
      required: false
