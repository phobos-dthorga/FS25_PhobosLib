name: Feature Request
description: Suggest a shared helper or compatibility improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should this helper make easier or safer?
    validations:
      required: true
  - type: textarea
    id: consumer
    attributes:
      label: Expected Consumer
      description: Which Phobos FS25 mod needs this?
    validations:
      required: false

